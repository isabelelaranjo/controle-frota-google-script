    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; border-top: 8px solid var(--blue); margin-bottom: 25px; box-sizing: border-box; } [cite: 4, 5]

    .header h2 { color: var(--blue); margin: 25px 0 5px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; } [cite: 8]
    .line { width: 40px; height: 4px; background: var(--yellow); margin: 10px auto; border-radius: 2px; } [cite: 9]
    label { display: block; margin-top: 15px; font-weight: bold; color: var(--blue); font-size: 11px; text-transform: uppercase; text-align: left; } [cite: 10, 11]
    .section-container { background-color: #f8fafb; border-radius: 8px; padding: 15px; margin-top: 15px; border: 1px solid #eee; box-sizing: border-box; } [cite: 11, 12]
    .section-title { font-size: 10px; color: #888; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; } [cite: 12, 13]
    input, select { width: 100% !important; padding: 12px; margin-top: 5px; border: 1px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fbfbfb; display: block; } [cite: 15, 16]
    .btn { width: 100%; background: var(--yellow); color: var(--blue); padding: 18px; border: none; border-radius: 8px; font-weight: 800; margin-top: 25px; cursor: pointer; font-size: 15px; text-transform: uppercase; } [cite: 17, 18]
    .cal-card { background: white; width: 100%; max-width: 900px; padding: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; box-sizing: border-box; } [cite: 18, 19]
    .fc .fc-daygrid-day { background-color: #FFFFFF !important; } [cite: 20]

    .modal-box { background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 320px; width: 90%; } [cite: 27]
